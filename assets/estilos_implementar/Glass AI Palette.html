<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Glass AI Palette</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --glass-bg: rgba(255,255,255,0.18);
    --glass-bg-strong: rgba(255,255,255,0.28);
    --glass-border: rgba(255,255,255,0.45);
    --glass-border-soft: rgba(255,255,255,0.25);
    --glass-shadow: 0 30px 60px -20px rgba(10, 14, 30, 0.55), 0 8px 18px -8px rgba(10, 14, 30, 0.35);
    --glass-inner: inset 0 1px 0 rgba(255,255,255,0.65), inset 0 -1px 0 rgba(255,255,255,0.12);
    --ink: #0f1320;
    --ink-soft: rgba(15, 19, 32, 0.65);
    --ink-faint: rgba(15, 19, 32, 0.42);
    --accent: oklch(0.62 0.18 265);
    --accent-2: oklch(0.72 0.15 320);
    --good: oklch(0.65 0.15 150);
    --warn: oklch(0.72 0.16 70);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }

  /* faux desktop icon row */
  .deskdock{
    position:absolute; left: 50%; transform: translateX(-50%); bottom: 28px;
    display:flex; gap:14px; padding: 10px 14px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 22px;
    box-shadow: var(--glass-shadow), var(--glass-inner);
  }
  .deskdock .ico{
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(160deg, rgba(255,255,255,0.6), rgba(255,255,255,0.1));
    border: 1px solid rgba(255,255,255,0.5);
    display:grid; place-items:center; color: white; font-size: 18px;
  }

  /* === GLASS WIDGET === */
  .widget-wrap{
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap: 10px;
    z-index: 50;
    width: min(420px, calc(100vw - 32px));
  }

  .glass{
    background: var(--glass-bg);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow), var(--glass-inner);
  }

  /* Toolbar */
  .toolbar{
    display:flex; align-items:center; gap: 8px;
    padding: 8px;
    border-radius: 999px;
    position: relative;
  }
  .toolbar::before{
    /* highlight sheen */
    content:""; position:absolute; inset:0; border-radius: inherit; pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0) 40%);
    opacity: 0.6;
  }
  .tbtn{
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid var(--glass-border-soft);
    background: linear-gradient(160deg, rgba(255,255,255,0.55), rgba(255,255,255,0.12));
    display:grid; place-items:center;
    color: var(--ink); cursor:pointer;
    transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 2px 8px rgba(10,14,30,0.15);
    position:relative;
  }
  .tbtn:hover{ transform: translateY(-1px); background: linear-gradient(160deg, rgba(255,255,255,0.7), rgba(255,255,255,0.2)); }
  .tbtn:active{ transform: translateY(0) scale(0.97); }
  .tbtn.active{
    background: linear-gradient(160deg, color-mix(in oklch, var(--accent) 60%, white), color-mix(in oklch, var(--accent) 20%, white));
    color: white;
    box-shadow: 0 4px 14px color-mix(in oklch, var(--accent) 35%, transparent), inset 0 1px 0 rgba(255,255,255,0.6);
    border-color: rgba(255,255,255,0.7);
  }
  .tbtn .dot{
    position:absolute; top: 6px; right: 8px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--good); box-shadow: 0 0 0 2px rgba(255,255,255,0.9);
  }
  .tbtn[title]{}
  .tbtn-square{ border-radius: 12px; width: 38px; height: 38px; }

  /* Panel */
  .panel{
    width: 100%;
    border-radius: 22px;
    overflow: hidden;
    display:flex; flex-direction:column;
    height: 460px;
    animation: pop .25s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes pop{
    from{ opacity:0; transform: translateY(-6px) scale(0.98); }
    to{ opacity:1; transform: none; }
  }
  .panel-head{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 18px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.25);
  }
  .panel-head h2{ margin:0; font-size: 14px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); display:flex; align-items:center; gap:8px;}
  .panel-head .subtitle{ font-size: 11px; color: var(--ink-soft); margin-top:2px;}
  .panel-body{ flex:1; overflow-y:auto; padding: 14px 16px; }
  .panel-foot{ padding: 10px 12px 12px; border-top: 1px solid rgba(255,255,255,0.22); }

  /* Chat */
  .chat-list{ display:flex; flex-direction:column; gap: 10px; }
  .bubble{
    max-width: 78%;
    padding: 9px 13px;
    border-radius: 18px;
    font-size: 13px; line-height: 1.4;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 4px 12px rgba(10,14,30,0.08), inset 0 1px 0 rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
  }
  .bubble.ai{
    align-self: flex-start;
    background: rgba(255,255,255,0.55);
    color: var(--ink);
    border-bottom-left-radius: 6px;
  }
  .bubble.user{
    align-self: flex-end;
    background: linear-gradient(160deg, color-mix(in oklch, var(--accent) 70%, white), color-mix(in oklch, var(--accent) 50%, white));
    color: white;
    border-color: rgba(255,255,255,0.55);
    border-bottom-right-radius: 6px;
  }
  .bubble .who{ display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; opacity:0.7; margin-bottom:2px; }
  .typing{ display:inline-flex; gap:4px; padding: 8px 12px; }
  .typing span{ width:6px; height:6px; border-radius:50%; background: var(--ink-soft); animation: blink 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay: .15s; }
  .typing span:nth-child(3){ animation-delay: .3s; }
  @keyframes blink{ 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .composer{
    display:flex; align-items:center; gap: 8px;
    padding: 6px 6px 6px 14px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 999px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .composer input{
    flex:1; border:0; background: transparent; outline:none;
    font-size: 13px; color: var(--ink); font-family: inherit;
  }
  .composer input::placeholder{ color: var(--ink-faint); }
  .iconbtn{
    width: 32px; height:32px; border-radius:50%;
    display:grid; place-items:center; cursor:pointer;
    border: 1px solid rgba(255,255,255,0.55);
    background: linear-gradient(160deg, rgba(255,255,255,0.65), rgba(255,255,255,0.2));
    color: var(--ink); transition: transform .15s ease;
  }
  .iconbtn:hover{ transform: scale(1.06); }
  .iconbtn.primary{
    background: linear-gradient(160deg, color-mix(in oklch, var(--accent) 70%, white), color-mix(in oklch, var(--accent) 50%, white));
    color: white;
    border-color: rgba(255,255,255,0.7);
    box-shadow: 0 4px 12px color-mix(in oklch, var(--accent) 30%, transparent);
  }

  /* Log */
  .log-tabs{ display:flex; gap: 6px; }
  .chip{
    font-size: 11px; padding: 5px 10px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.35);
    cursor:pointer; color: var(--ink-soft);
    transition: background .15s ease, color .15s ease;
  }
  .chip.on{ background: rgba(15,19,32,0.78); color: white; border-color: rgba(255,255,255,0.2); }
  .log-row{
    display:flex; gap:10px; padding: 9px 10px;
    border-radius: 12px;
    transition: background .15s ease;
    border: 1px solid transparent;
  }
  .log-row:hover{ background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.3); }
  .log-pill{
    flex-shrink:0; font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    padding: 3px 7px; border-radius: 6px; height: 18px; line-height: 12px;
    text-transform: uppercase; align-self: flex-start;
  }
  .log-pill.info{ background: rgba(255,255,255,0.6); color: var(--ink); }
  .log-pill.run{ background: color-mix(in oklch, var(--accent) 25%, white); color: color-mix(in oklch, var(--accent) 30%, black); }
  .log-pill.ok{ background: color-mix(in oklch, var(--good) 30%, white); color: color-mix(in oklch, var(--good) 40%, black); }
  .log-pill.warn{ background: color-mix(in oklch, var(--warn) 35%, white); color: color-mix(in oklch, var(--warn) 50%, black); }
  .log-text{ font-size: 12px; color: var(--ink); flex:1; line-height: 1.4; }
  .log-time{ font-size: 10px; color: var(--ink-faint); font-variant-numeric: tabular-nums; flex-shrink:0; align-self:flex-start; margin-top: 2px;}

  /* Macros */
  .macro-card{
    display:flex; align-items:center; gap: 12px;
    padding: 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    margin-bottom: 8px;
    transition: transform .15s ease, background .15s ease;
  }
  .macro-card:hover{ background: rgba(255,255,255,0.55); }
  .macro-icon{
    width: 38px; height:38px; border-radius: 11px;
    display:grid; place-items:center;
    background: linear-gradient(160deg, color-mix(in oklch, var(--accent-2) 50%, white), color-mix(in oklch, var(--accent) 50%, white));
    color: white; flex-shrink:0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .macro-info{ flex:1; min-width:0; }
  .macro-title{ font-size: 13px; font-weight:600; color: var(--ink); display:flex; align-items:center; gap:6px;}
  .macro-meta{ font-size: 11px; color: var(--ink-soft); margin-top: 2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .kbd{
    display:inline-flex; gap:3px; align-items:center;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 10px;
    padding: 1px 6px; border-radius: 5px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.55);
    color: var(--ink-soft);
  }
  .toggle{
    width: 36px; height: 22px; border-radius: 999px;
    background: rgba(15,19,32,0.18);
    position:relative; cursor:pointer; transition: background .2s ease;
    border: 1px solid rgba(255,255,255,0.45);
    flex-shrink:0;
  }
  .toggle::after{
    content:""; position:absolute; top:1px; left:1px;
    width: 18px; height:18px; border-radius:50%;
    background: white; box-shadow: 0 2px 6px rgba(10,14,30,0.25);
    transition: left .2s ease;
  }
  .toggle.on{ background: color-mix(in oklch, var(--accent) 70%, white); }
  .toggle.on::after{ left: 15px; }
  .run-btn{
    padding: 6px 12px; font-size: 11px; font-weight:600;
    border-radius: 999px;
    background: rgba(15,19,32,0.8); color: white; border:0; cursor:pointer;
    transition: transform .15s ease;
  }
  .run-btn:hover{ transform: translateY(-1px); }
  .run-btn.running{ background: var(--good); }

  /* Menu dropdown */
  .menu{
    position: absolute; right: 0; top: calc(100% + 8px);
    padding: 6px;
    border-radius: 14px;
    min-width: 180px;
    z-index: 60;
    animation: pop .15s ease;
  }
  .menu .item{
    display:flex; align-items:center; gap:10px;
    padding: 8px 10px; border-radius: 9px;
    font-size: 13px; cursor:pointer; color: var(--ink);
  }
  .menu .item:hover{ background: rgba(255,255,255,0.5); }
  .menu .item.danger{ color: oklch(0.55 0.18 25); }
  .menu .sep{ height:1px; background: rgba(15,19,32,0.08); margin: 4px 6px; }

  /* Reopen pill (when closed) */
  .reopen{
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    padding: 8px 14px; border-radius: 999px;
    font-size: 12px; font-weight: 600; color: var(--ink);
    cursor:pointer; display:flex; align-items:center; gap: 8px;
    z-index: 60;
  }

  /* Scrollbars */
  .panel-body::-webkit-scrollbar{ width: 6px; }
  .panel-body::-webkit-scrollbar-thumb{ background: rgba(15,19,32,0.18); border-radius: 999px; }

  .empty{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height: 100%; text-align:center; color: var(--ink-soft); font-size:12px; gap:8px;
  }
</style>
</head>
<body>
  <div class="desktop">
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="orb c"></div>
  </div>

  <div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

/* === Icons (simple line glyphs, original) === */
const Icon = {
  chat: (p)=> <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 12a8 8 0 0 1-11.5 7.2L4 20l1-4.4A8 8 0 1 1 21 12z"/><circle cx="9" cy="12" r=".8" fill="currentColor"/><circle cx="12" cy="12" r=".8" fill="currentColor"/><circle cx="15" cy="12" r=".8" fill="currentColor"/></svg>,
  log: (p)=> <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 5h16M4 10h16M4 15h10M4 20h7"/></svg>,
  macro: (p)=> <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M13 3 5 13h6l-1 8 8-10h-6l1-8z"/></svg>,
  menu: (p)=> <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" {...p}><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>,
  send: (p)=> <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M22 2 11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>,
  screenshot: (p)=> <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 8V5a1 1 0 0 1 1-1h3"/><path d="M20 8V5a1 1 0 0 0-1-1h-3"/><path d="M4 16v3a1 1 0 0 0 1 1h3"/><path d="M20 16v3a1 1 0 0 1-1 1h-3"/><rect x="8" y="9" width="8" height="6" rx="1"/></svg>,
  attach: (p)=> <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m21 12-9 9a5 5 0 0 1-7-7l9-9a3.5 3.5 0 1 1 5 5l-9 9a2 2 0 0 1-3-3l8-8"/></svg>,
  minimize: (p)=> <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" {...p}><path d="M5 18h14"/></svg>,
  close: (p)=> <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" {...p}><path d="M6 6l12 12M18 6L6 18"/></svg>,
  pin: (p)=> <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 17v5M8 3h8l-1 5 3 4H6l3-4-1-5z"/></svg>,
  settings: (p)=> <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>,
  play: (p)=> <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" {...p}><path d="M8 5v14l11-7z"/></svg>,
  search: (p)=> <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" {...p}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
  sparkles: (p)=> <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" {...p}><path d="M12 2l1.6 4.4L18 8l-4.4 1.6L12 14l-1.6-4.4L6 8l4.4-1.6z"/><path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8z"/></svg>,
  reopen: (p)=> <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 5v14M5 12h14"/></svg>,
};

/* === Sample data === */
const SEED_CHAT = [
  { who:'ai', text:"Hi — I'm watching your workflow. Need a hand summarizing today's session?" },
  { who:'user', text:"Yeah, pull the highlights from the build review." },
  { who:'ai', text:"Got it. 3 key callouts: regression on the auth flow, a stale dependency on Stripe v9, and the new onboarding skeleton looks 👌. Want me to draft a recap?" },
];

const SEED_LOG = [
  { kind:'ok',   time:'14:32', text:'Macro "Daily standup" finished — 4 actions, 1.8s' },
  { kind:'run',  time:'14:28', text:'Chat session started — context: Q3 roadmap.md' },
  { kind:'info', time:'14:14', text:'Indexed 217 files across /design + /docs' },
  { kind:'warn', time:'13:51', text:'Rate limit near threshold (84/100). Backing off.' },
  { kind:'ok',   time:'13:42', text:'Macro "Triage inbox" finished — archived 12, replied 3' },
  { kind:'info', time:'13:20', text:'Switched model: Claude Sonnet → Opus' },
  { kind:'run',  time:'13:18', text:'Macro "Compose changelog" started' },
  { kind:'ok',   time:'12:55', text:'Linked workspace: Notion · Linear · Figma' },
];

const SEED_MACROS = [
  { id:'m1', name:'Daily standup',  desc:'Summarize yesterday + today + blockers', shortcut:['⌘','⇧','D'], enabled:true,  hot:true  },
  { id:'m2', name:'Triage inbox',   desc:'Classify, archive low-prio, draft replies', shortcut:['⌘','⇧','I'], enabled:true,  hot:false },
  { id:'m3', name:'Compose changelog', desc:'Group git commits by area, write notes', shortcut:['⌘','⇧','L'], enabled:false, hot:false },
  { id:'m4', name:'Meeting recap',  desc:'From transcript → decisions + action items', shortcut:['⌘','⇧','M'], enabled:true,  hot:true  },
  { id:'m5', name:'Reading queue',  desc:'TL;DR every tab in the queue group', shortcut:['⌘','⇧','R'], enabled:false, hot:false },
];

/* === Components === */
function Toolbar({ active, setActive, onMenu, menuOpen, hasUpdates }){
  const tools = [
    { id:'chat',  Icon: Icon.chat,  label:'AI Chat' },
    { id:'log',   Icon: Icon.log,   label:'AI Log' },
    { id:'macro', Icon: Icon.macro, label:'AI Macros' },
  ];
  return (
    <div className="toolbar glass" style={{ position:'relative' }}>
      {tools.map(t=> (
        <button
          key={t.id}
          className={"tbtn" + (active===t.id?' active':'')}
          title={t.label}
          onClick={()=>setActive(t.id)}
        >
          <t.Icon />
          {t.id==='log' && hasUpdates && <span className="dot"/>}
        </button>
      ))}
      <div style={{ width:1, height:24, background:'rgba(255,255,255,0.4)', margin:'0 4px' }}/>
      <button
        className={"tbtn tbtn-square" + (menuOpen?' active':'')}
        title="Menu"
        onClick={onMenu}
      >
        <Icon.menu />
      </button>
    </div>
  );
}

function ChatPanel(){
  const [msgs, setMsgs] = useState(SEED_CHAT);
  const [draft, setDraft] = useState('');
  const [typing, setTyping] = useState(false);
  const bodyRef = useRef(null);

  useEffect(()=>{
    if(bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [msgs, typing]);

  const send = ()=> {
    const t = draft.trim();
    if(!t) return;
    setMsgs(m=>[...m, {who:'user', text:t}]);
    setDraft('');
    setTyping(true);
    setTimeout(()=> {
      setTyping(false);
      const replies = [
        "On it — drafting now. Anything to emphasize?",
        "Sure. I'll cross-reference yesterday's notes too.",
        "Got it. I'll keep it under 5 bullets.",
        "Done thinking. Want a short or long version?",
      ];
      setMsgs(m=>[...m, {who:'ai', text: replies[Math.floor(Math.random()*replies.length)]}]);
    }, 900 + Math.random()*600);
  };

  return (
    <>
      <div className="panel-head">
        <div>
          <h2><Icon.sparkles style={{color:'var(--accent)'}}/> AI Chat</h2>
          <div className="subtitle">Context · 3 docs · roadmap.md +2</div>
        </div>
        <span className="chip on" style={{cursor:'default'}}>Sonnet 4</span>
      </div>
      <div className="panel-body" ref={bodyRef}>
        <div className="chat-list">
          {msgs.map((m,i)=>(
            <div key={i} className={"bubble "+m.who}>
              <span className="who">{m.who}</span>
              {m.text}
            </div>
          ))}
          {typing && (
            <div className="bubble ai typing">
              <span/><span/><span/>
            </div>
          )}
        </div>
      </div>
      <div className="panel-foot">
        <div className="composer">
          <button className="iconbtn" title="Attach" style={{width:28, height:28}}><Icon.attach/></button>
          <input
            placeholder="Ask anything…"
            value={draft}
            onChange={e=>setDraft(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter') send(); }}
          />
          <button className="iconbtn" title="Send screenshot" style={{width:28, height:28}} onClick={()=> setMsgs(m=>[...m, {who:'user', text:'📸 Sent a screenshot'}])}><Icon.screenshot/></button>
          <button className="iconbtn primary" title="Send" onClick={send}><Icon.send/></button>
        </div>
      </div>
    </>
  );
}

function LogPanel(){
  const [filter, setFilter] = useState('all');
  const [q, setQ] = useState('');
  const filtered = SEED_LOG.filter(r=>{
    if(filter !== 'all' && r.kind !== filter) return false;
    if(q && !r.text.toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  });
  return (
    <>
      <div className="panel-head">
        <div>
          <h2><Icon.log style={{color:'var(--accent)'}}/> AI Log</h2>
          <div className="subtitle">{SEED_LOG.length} events today</div>
        </div>
        <div className="log-tabs">
          {['all','run','ok','warn'].map(k=>(
            <span key={k} className={"chip "+(filter===k?'on':'')} onClick={()=>setFilter(k)}>
              {k==='all'?'All':k==='run'?'Runs':k==='ok'?'Done':'Warn'}
            </span>
          ))}
        </div>
      </div>
      <div className="panel-body">
        <div className="composer" style={{ marginBottom: 10, padding: '4px 12px' }}>
          <Icon.search style={{ color:'var(--ink-faint)'}}/>
          <input
            placeholder="Search log…"
            value={q}
            onChange={e=>setQ(e.target.value)}
            style={{ padding: '6px 0' }}
          />
        </div>
        {filtered.length===0 && (
          <div className="empty">No events match.</div>
        )}
        <div style={{display:'flex', flexDirection:'column', gap: 2}}>
          {filtered.map((r,i)=>(
            <div key={i} className="log-row">
              <span className={"log-pill "+r.kind}>
                {r.kind}
              </span>
              <span className="log-text">{r.text}</span>
              <span className="log-time">{r.time}</span>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

function MacroPanel(){
  const [macros, setMacros] = useState(SEED_MACROS);
  const [running, setRunning] = useState(null);

  const toggle = (id)=>{
    setMacros(m=> m.map(x=> x.id===id ? {...x, enabled: !x.enabled} : x));
  };
  const run = (id)=>{
    setRunning(id);
    setTimeout(()=>setRunning(null), 1500);
  };

  return (
    <>
      <div className="panel-head">
        <div>
          <h2><Icon.macro style={{color:'var(--accent)'}}/> AI Macros</h2>
          <div className="subtitle">{macros.filter(m=>m.enabled).length} active · {macros.filter(m=>m.hot).length} hot-keyed</div>
        </div>
        <button className="run-btn" style={{background:'rgba(255,255,255,0.55)', color:'var(--ink)'}}>+ New</button>
      </div>
      <div className="panel-body">
        {macros.map(m=>(
          <div key={m.id} className="macro-card">
            <div className="macro-icon">
              <Icon.macro style={{ width:18, height:18 }}/>
            </div>
            <div className="macro-info">
              <div className="macro-title">
                {m.name}
                {m.hot && <span className="kbd">{m.shortcut.join(' ')}</span>}
              </div>
              <div className="macro-meta">{m.desc}</div>
            </div>
            <button
              className={"run-btn"+(running===m.id?' running':'')}
              onClick={()=>run(m.id)}
              disabled={!m.enabled || running===m.id}
              style={{opacity: m.enabled?1:0.4}}
            >
              {running===m.id ? '● Running' : <span style={{display:'inline-flex', alignItems:'center', gap:4}}><Icon.play/> Run</span>}
            </button>
            <div className={"toggle"+(m.enabled?' on':'')} onClick={()=>toggle(m.id)} role="switch" aria-checked={m.enabled}/>
          </div>
        ))}
      </div>
    </>
  );
}

function Menu({ onMinimize, onClose, onPin, pinned }){
  return (
    <div className="menu glass">
      <div className="item" onClick={onMinimize}><Icon.minimize/> Minimize to toolbar</div>
      <div className="item" onClick={onPin}><Icon.pin/> {pinned ? 'Unpin from top' : 'Pin to top'}</div>
      <div className="item"><Icon.settings/> Preferences…</div>
      <div className="sep"/>
      <div className="item danger" onClick={onClose}><Icon.close/> Close</div>
    </div>
  );
}

function App(){
  const [active, setActive] = useState('chat');
  const [menuOpen, setMenuOpen] = useState(false);
  const [state, setState] = useState('open'); // open | minimized | closed
  const [pinned, setPinned] = useState(true);
  const wrapRef = useRef(null);

  // Close menu on outside click
  useEffect(()=>{
    const h = (e)=> {
      if(wrapRef.current && !wrapRef.current.contains(e.target)) setMenuOpen(false);
    };
    document.addEventListener('mousedown', h);
    return ()=> document.removeEventListener('mousedown', h);
  },[]);

  if(state === 'closed'){
    return (
      <div className="reopen glass" onClick={()=>setState('open')}>
        <Icon.sparkles style={{color:'var(--accent)'}}/> Open AI Palette
      </div>
    );
  }

  return (
    <div className="widget-wrap" ref={wrapRef}>
      <div style={{position:'relative', alignSelf:'center'}}>
        <Toolbar
          active={active}
          setActive={(id)=>{ setActive(id); if(state==='minimized') setState('open'); setMenuOpen(false); }}
          onMenu={()=>setMenuOpen(o=>!o)}
          menuOpen={menuOpen}
          hasUpdates={true}
        />
        {menuOpen && (
          <Menu
            onMinimize={()=>{ setState(s=> s==='minimized'?'open':'minimized'); setMenuOpen(false); }}
            onClose={()=>{ setState('closed'); setMenuOpen(false); }}
            onPin={()=>{ setPinned(p=>!p); setMenuOpen(false); }}
            pinned={pinned}
          />
        )}
      </div>

      {state==='open' && (
        <div className="panel glass">
          {active==='chat'  && <ChatPanel/>}
          {active==='log'   && <LogPanel/>}
          {active==='macro' && <MacroPanel/>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
